<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<h1>Рецензия на книгу "{{ book.title }}"</h1>

<form method="POST" action="{{ url_for('add_review', book_id=book.id) }}" id="reviewForm">
    <div class="mb-3">
        <label for="rating" class="form-label">Оценка *</label>
        <select class="form-select" id="rating" name="rating" required>
            <option value="5" selected>5 – отлично</option>
            <option value="4">4 – хорошо</option>
            <option value="3">3 – удовлетворительно</option>
            <option value="2">2 – неудовлетворительно</option>
            <option value="1">1 – плохо</option>
            <option value="0">0 – ужасно</option>
        </select>
    </div>
    
    <div class="mb-3">
        <label for="text" class="form-label">Текст рецензии * (поддерживает Markdown)</label>
        <textarea class="form-control markdown-editor" id="text" name="text" rows="10"></textarea>
    </div>
    
    <button type="submit" class="btn btn-success">Сохранить рецензию</button>
    <a href="{{ url_for('book_detail', book_id=book.id) }}" class="btn btn-secondary">Отмена</a>
</form>

<script>
    // Находим форму
    const form = document.getElementById('reviewForm');
    const originalTextarea = document.getElementById('text');
    let easyMDE = null;
    
    // Инициализируем EasyMDE
    if (originalTextarea) {
        easyMDE = new EasyMDE({ 
            element: originalTextarea,
            spellChecker: false,
            autoDownloadFontAwesome: false
        });
        
        // Убираем required у оригинального textarea
        originalTextarea.removeAttribute('required');
    }
    
    // Перед отправкой формы копируем данные из EasyMDE в оригинальный textarea
    form.addEventListener('submit', function(e) {
        // Получаем текст из EasyMDE
        let reviewText = '';
        
        if (easyMDE) {
            reviewText = easyMDE.value();  // Берем текст из редактора
        } else {
            reviewText = originalTextarea.value;
        }
        
        // Проверяем, не пустой ли текст
        if (!reviewText.trim()) {
            e.preventDefault();
            alert('Пожалуйста, введите текст рецензии');
            return false;
        }
        
        // Копируем текст в оригинальный textarea (для отправки на сервер)
        originalTextarea.value = reviewText;
        
        // Не блокируем отправку
        return true;
    });
</script>
{% endblock %}
