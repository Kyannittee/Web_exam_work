<!DOCTYPE html>
{% macro book_form(book, genres, book_genre_ids, action_url, button_text) %}
<form method="POST" enctype="multipart/form-data" action="{{ action_url }}">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="title" class="form-label">Название *</label>
            <input type="text" class="form-control" id="title" name="title" 
                   value="{{ book.title if book else '' }}" required>
        </div>
        
        <div class="col-md-6 mb-3">
            <label for="author" class="form-label">Автор *</label>
            <input type="text" class="form-control" id="author" name="author" 
                   value="{{ book.author if book else '' }}" required>
        </div>
        
        <div class="col-md-3 mb-3">
            <label for="year" class="form-label">Год *</label>
            <input type="number" class="form-control" id="year" name="year" 
                   value="{{ book.year if book else '' }}" required>
        </div>
        
        <div class="col-md-5 mb-3">
            <label for="publisher" class="form-label">Издательство *</label>
            <input type="text" class="form-control" id="publisher" name="publisher" 
                   value="{{ book.publisher if book else '' }}" required>
        </div>
        
        <div class="col-md-4 mb-3">
            <label for="pages" class="form-label">Объём (страниц) *</label>
            <input type="number" class="form-control" id="pages" name="pages" 
                   value="{{ book.pages if book else '' }}" required>
        </div>
        
        <div class="col-12 mb-3">
            <label for="genres" class="form-label">Жанры *</label>
            <select class="form-select" id="genres" name="genres" multiple size="5" required>
                {% for genre in genres %}
                    {% if book_genre_ids and genre.id in book_genre_ids %}
                        <option value="{{ genre.id }}" selected>{{ genre.name }}</option>
                    {% else %}
                        <option value="{{ genre.id }}">{{ genre.name }}</option>
                    {% endif %}
                {% endfor %}
            </select>
            <small class="text-muted">Удерживайте Ctrl для выбора нескольких жанров</small>
        </div>
        
        <div class="col-12 mb-3">
            <label for="description" class="form-label">Описание * (поддерживает Markdown)</label>
            <textarea class="form-control markdown-editor" id="description" name="description" rows="10">{{ book.description if book else '' }}</textarea>
        </div>
        
        {% if not book %}
        <div class="col-12 mb-3">
            <label for="cover" class="form-label">Обложка *</label>
            <input type="file" class="form-control" id="cover" name="cover" accept="image/*" required>
        </div>
        {% endif %}
    </div>
    
    <button type="submit" class="btn btn-success">{{ button_text }}</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endmacro %}
